# Backend container — works locally AND on a server (GCP free VM, VPS, etc.).
# ALL config comes from backend/.env (create it from backend/.env.example).
#
#   docker compose up -d --build     # → backend on http://localhost:8000 (/health, /docs)
#
# The ./data volume persists the SQLite DB + uploaded files across restarts/reboots.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_OCR: "false" # set "true" to bake in PaddleOCR for scanned/image uploads
    image: medexplain-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data # persist the SQLite DB + uploaded files
    restart: unless-stopped
