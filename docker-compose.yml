# Local backend container — test the production image before deploying.
# (The frontend deploys to Vercel separately; see DEPLOYMENT.md.)
#
#   docker compose up --build      # → backend on http://localhost:8000 (/docs, /health)
#
# Reuses backend/.env for the Gemini key etc.; runs in dev mode locally so it boots with the
# default JWT secret. A real deployment uses MEDEXPLAIN_ENV=prod + a strong MEDEXPLAIN_JWT_SECRET.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_OCR: "false" # set "true" to bake in PaddleOCR for scanned/image uploads
    image: medexplain-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MEDEXPLAIN_ENV: dev
      MEDEXPLAIN_CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./data:/app/data # persist the SQLite DB + uploaded files
    restart: unless-stopped
